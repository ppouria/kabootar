name: Docker Kabootar DNS

on:
  push:
    paths:
      - "server/**"
      - ".github/workflows/docker-server.yml"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/docker-server.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      build_server_image:
        description: "Build DNS docker image"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/kabootar-dns

jobs:
  prepare-version:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.ver.outputs.version_name }}
      version_tag: ${{ steps.ver.outputs.version_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Version
        id: ver
        shell: bash
        run: |
          VERSION_NAME="$(sed -n 's/^version_name=//p' version.properties | head -n 1 | tr -d '\r\n')"

          VERSION_NAME="${VERSION_NAME:-0.0.0}"
          SAFE_NAME="$(printf '%s' "${VERSION_NAME}" | tr -cs '[:alnum:]._-' '-' | sed 's/^-*//; s/-*$//')"
          SAFE_NAME="${SAFE_NAME:-0.0.0}"

          echo "version_name=${SAFE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version_tag=v${SAFE_NAME}" >> "${GITHUB_OUTPUT}"

  build-server-image:
    name: Build Server Docker Image
    needs: prepare-version
    if: github.event_name != 'workflow_dispatch' || inputs.build_server_image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=${{ needs.prepare-version.outputs.version_tag }}
            type=raw,value=v${{ needs.prepare-version.outputs.version_name }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Log in to GHCR
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build server image archive
        if: github.event_name != 'release'
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64
          push: false
          provenance: false
          sbom: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          outputs: type=docker,dest=/tmp/kabootar-dns-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload server image archive
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: Kabootar-dns-docker-image-${{ needs.prepare-version.outputs.version_tag }}
          path: /tmp/kabootar-dns-image.tar
          if-no-files-found: error

      - name: Build and push release image
        if: github.event_name == 'release'
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
