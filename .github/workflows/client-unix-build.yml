name: Kabootar Client Linux macOS Build

on:
  push:
    paths:
      - "client/**"
      - ".github/workflows/client-unix-build.yml"
  pull_request:
    paths:
      - "client/**"
      - ".github/workflows/client-unix-build.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-unix:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux x64
            artifact_name: kabootar-client-linux-x64
            artifact_path: client/dist/kabootar-client-linux-x64.tar.gz
          - os: macos-latest
            label: macOS
            artifact_name: kabootar-client-macos
            artifact_path: client/dist/kabootar-client-macos.zip

    defaults:
      run:
        shell: bash
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/frontend/package-lock.json

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if ! python -m pip install -r requirements.txt; then
            echo "requirements.txt install failed, falling back to core dependencies"
            python -m pip install \
              Flask==3.0.3 \
              SQLAlchemy==2.0.36 \
              alembic==1.14.1 \
              python-dotenv==1.0.1 \
              requests==2.32.3 \
              PySocks==1.7.1 \
              feedparser==6.0.11 \
              dnslib==0.9.25 \
              dnspython==2.6.1
          fi
          python -m pip install pywebview pyinstaller Pillow cairosvg

      - name: Prepare Kabootar Logo Assets
        run: python build/assets/prepare_logo_assets.py

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build Linux Package
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --onefile \
            --windowed \
            --name kabootar-client \
            --add-data "frontend/templates:frontend/templates" \
            --add-data "frontend/static:frontend/static" \
            --add-data "alembic:alembic" \
            desktop_client.py
          stage_dir="dist/kabootar-client-linux-x64"
          rm -rf "$stage_dir"
          mkdir -p "$stage_dir"
          cp dist/kabootar-client "$stage_dir/"
          cp build/linux/kabootar.png "$stage_dir/"
          cp README.md "$stage_dir/"
          tar -C dist -czf dist/kabootar-client-linux-x64.tar.gz kabootar-client-linux-x64

      - name: Build macOS Package
        if: matrix.os == 'macos-latest'
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name kabootar-client \
            --icon build/macos/kabootar.icns \
            --add-data "frontend/templates:frontend/templates" \
            --add-data "frontend/static:frontend/static" \
            --add-data "alembic:alembic" \
            desktop_client.py
          rm -f dist/kabootar-client-macos.zip
          ditto -c -k --sequesterRsrc --keepParent dist/kabootar-client.app dist/kabootar-client-macos.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      - name: Publish Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_path }}
