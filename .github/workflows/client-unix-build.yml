name: Kabootar Linux macOS Build

on:
  push:
    paths:
      - "client/**"
      - "version.properties"
      - ".github/workflows/client-unix-build.yml"
  pull_request:
    paths:
      - "client/**"
      - "version.properties"
      - ".github/workflows/client-unix-build.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-unix:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            label: Linux amd64
            kind: linux
            out_arch: amd64
          - runner: ubuntu-24.04-arm
            label: Linux arm64
            kind: linux
            out_arch: arm64
          - runner: macos-latest
            label: macOS
            kind: macos
            out_arch: auto

    defaults:
      run:
        shell: bash
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Version
        run: |
          VERSION_NAME="$(sed -n 's/^version_name=//p' ../version.properties | head -n 1)"
          VERSION_NAME="${VERSION_NAME:-0.0.0}"
          SAFE_NAME="$(echo "${VERSION_NAME}" | tr -cs '[:alnum:]._-' '-')"
          VERSION_TAG="v${SAFE_NAME}"
          echo "VERSION_TAG=${VERSION_TAG}" >> "${GITHUB_ENV}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/frontend/package-lock.json

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if ! python -m pip install -r requirements.txt; then
            echo "requirements.txt install failed, falling back to core dependencies"
            python -m pip install \
              Flask==3.0.3 \
              SQLAlchemy==2.0.36 \
              alembic==1.14.1 \
              python-dotenv==1.0.1 \
              requests==2.32.3 \
              PySocks==1.7.1 \
              feedparser==6.0.11 \
              dnslib==0.9.25 \
              dnspython==2.6.1
          fi
          python -m pip install pywebview pyinstaller Pillow cairosvg

      - name: Prepare Kabootar Logo Assets
        run: python build/assets/prepare_logo_assets.py

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build Linux GUI + WEB Binaries
        if: matrix.kind == 'linux'
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --onefile \
            --windowed \
            --name kabootar-gui \
            --add-data "../version.properties:." \
            --add-data "frontend/templates:frontend/templates" \
            --add-data "frontend/static:frontend/static" \
            --add-data "app/db/alembic:app/db/alembic" \
            desktop_client.py

          python -m PyInstaller \
            --noconfirm \
            --clean \
            --onefile \
            --name kabootar-web \
            --add-data "../version.properties:." \
            --add-data "frontend/templates:frontend/templates" \
            --add-data "frontend/static:frontend/static" \
            --add-data "app/db/alembic:app/db/alembic" \
            web_client.py

          GUI_OUT="Kabootar-client-linux-${{ matrix.out_arch }}-${VERSION_TAG}"
          WEB_OUT="Kabootar-client-linux-${{ matrix.out_arch }}-web-${VERSION_TAG}"

          cp dist/kabootar-gui "dist/${GUI_OUT}"
          cp dist/kabootar-web "dist/${WEB_OUT}"
          chmod +x "dist/${GUI_OUT}" "dist/${WEB_OUT}"

          echo "GUI_OUT=${GUI_OUT}" >> "${GITHUB_ENV}"
          echo "WEB_OUT=${WEB_OUT}" >> "${GITHUB_ENV}"

      - name: Build macOS Darwin Binary
        if: matrix.kind == 'macos'
        run: |
          ARCH_RAW="$(uname -m)"
          case "${ARCH_RAW}" in
            x86_64|amd64) OUT_ARCH="amd64" ;;
            arm64|aarch64) OUT_ARCH="arm64" ;;
            *) OUT_ARCH="${ARCH_RAW}" ;;
          esac

          python -m PyInstaller \
            --noconfirm \
            --clean \
            --onefile \
            --windowed \
            --name kabootar-darwin \
            --icon build/macos/kabootar.icns \
            --add-data "../version.properties:." \
            --add-data "frontend/templates:frontend/templates" \
            --add-data "frontend/static:frontend/static" \
            --add-data "app/db/alembic:app/db/alembic" \
            desktop_client.py

          DARWIN_OUT="Kabootar-client-darwin-${OUT_ARCH}-${VERSION_TAG}"
          cp dist/kabootar-darwin "dist/${DARWIN_OUT}"
          chmod +x "dist/${DARWIN_OUT}"

          echo "DARWIN_OUT=${DARWIN_OUT}" >> "${GITHUB_ENV}"

      - name: Upload Linux GUI Artifact
        if: matrix.kind == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.GUI_OUT }}
          path: client/dist/${{ env.GUI_OUT }}
          if-no-files-found: error

      - name: Upload Linux WEB Artifact
        if: matrix.kind == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.WEB_OUT }}
          path: client/dist/${{ env.WEB_OUT }}
          if-no-files-found: error

      - name: Upload macOS Artifact
        if: matrix.kind == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DARWIN_OUT }}
          path: client/dist/${{ env.DARWIN_OUT }}
          if-no-files-found: error

      - name: Publish Linux GUI Release Asset
        if: github.event_name == 'release' && matrix.kind == 'linux'
        uses: softprops/action-gh-release@v2
        with:
          files: client/dist/${{ env.GUI_OUT }}

      - name: Publish Linux WEB Release Asset
        if: github.event_name == 'release' && matrix.kind == 'linux'
        uses: softprops/action-gh-release@v2
        with:
          files: client/dist/${{ env.WEB_OUT }}

      - name: Publish macOS Release Asset
        if: github.event_name == 'release' && matrix.kind == 'macos'
        uses: softprops/action-gh-release@v2
        with:
          files: client/dist/${{ env.DARWIN_OUT }}

