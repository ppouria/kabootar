name: Kabootar Windows Build

on:
  push:
    paths:
      - "client/**"
      - "version.properties"
      - ".github/workflows/client-windows-build.yml"
  pull_request:
    paths:
      - "client/**"
      - "version.properties"
      - ".github/workflows/client-windows-build.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs: {}

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x86
            runner: windows-latest
            python_arch: x86
            out_arch: x86
          - label: x64
            runner: windows-latest
            python_arch: x64
            out_arch: amd64
          - label: arm64
            runner: windows-11-arm
            python_arch: arm64
            out_arch: arm64
    defaults:
      run:
        shell: powershell
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Version
        shell: powershell
        run: |
          $versionName = "0.0.0"
          Get-Content "..\\version.properties" | ForEach-Object {
            if ($_ -match "^version_name=(.+)$") {
              $versionName = $Matches[1].Trim()
            }
          }
          if ([string]::IsNullOrWhiteSpace($versionName)) { $versionName = "0.0.0" }
          $safeName = ($versionName -replace "[^A-Za-z0-9._-]", "-")
          $versionTag = "v$safeName"
          "VERSION_TAG=$versionTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare Output Names
        shell: powershell
        run: |
          $arch = "${{ matrix.out_arch }}"
          $baseName = "Kabootar-client-windows-$arch-$env:VERSION_TAG"
          "OUT_BASENAME=$baseName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OUT_FILE=$baseName.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ARTIFACT_NAME=$baseName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: ${{ matrix.python_arch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/frontend/package-lock.json

      - name: Prepare Kabootar Logo Assets
        run: |
          python -m pip install Pillow cairosvg
          python build\assets\prepare_logo_assets.py

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          if ($LASTEXITCODE -ne 0) {
            Write-Host "requirements.txt install failed, falling back to core dependencies"
            python -m pip install Flask==3.0.3 SQLAlchemy==2.0.36 alembic==1.14.1 python-dotenv==1.0.1 requests==2.32.3 PySocks==1.7.1 feedparser==6.0.11 dnslib==0.9.25 dnspython==2.6.1
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -m pip install pywebview pyinstaller
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Frontend
        shell: cmd
        run: |
          pushd frontend
          npm ci
          if errorlevel 1 exit /b 1
          npm run build
          if errorlevel 1 exit /b 1
          popd

      - name: Build Desktop EXE (${{ matrix.label }})
        run: |
          $args = @(
            "--noconfirm"
            "--clean"
            "--onefile"
            "--windowed"
            "--name", "kabootar"
            "--icon", "build\windows\kabootar.ico"
            "--paths", "vendor\\python"
            "--hidden-import", "persian_encoder"
            "--hidden-import", "persian_encoder.seed_words"
            "--hidden-import", "persian_encoder.large_words"
            "--add-data", "..\version.properties;."
            "--add-data", "frontend\templates;frontend\templates"
            "--add-data", "frontend\static;frontend\static"
            "--add-data", "app\\db\\alembic;app\\db\\alembic"
            "--add-data", "vendor\\python\\persian_encoder\\data;persian_encoder\\data"
            "--collect-all", "persian_encoder"
            "desktop_client.py"
          )
          python -m PyInstaller @args
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify Persian Encoder Data In EXE (${{ matrix.label }})
        run: |
          $archiveList = python -m PyInstaller.utils.cliutils.archive_viewer -l dist\kabootar.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($archiveList -notmatch "persian_encoder[\\/]+data[\\/]+hazm_words\.tsv") {
            throw "Missing persian_encoder data file (hazm_words.tsv) in built EXE."
          }

      - name: Prepare Versioned EXE (${{ matrix.label }})
        run: Copy-Item dist\kabootar.exe "dist\${{ env.OUT_FILE }}" -Force

      - name: Upload Artifact (${{ matrix.label }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: client/dist/${{ env.OUT_FILE }}
          if-no-files-found: error

      - name: Publish Release Asset (${{ matrix.label }})
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: client/dist/${{ env.OUT_FILE }}
