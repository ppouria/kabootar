name: Kabootar Client Windows Build

on:
  push:
    paths:
      - "client/**"
      - ".github/workflows/client-windows-build.yml"
  pull_request:
    paths:
      - "client/**"
      - ".github/workflows/client-windows-build.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      build_arm64:
        description: "Build ARM64 on self-hosted Windows ARM64 runner"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-amd64:
    name: Build Windows AMD64
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: "x64"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare Kabootar Logo Assets
        run: |
          python -m pip install Pillow cairosvg
          python build\assets\prepare_logo_assets.py

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          if ($LASTEXITCODE -ne 0) {
            Write-Host "requirements.txt install failed, falling back to core dependencies"
            python -m pip install Flask==3.0.3 SQLAlchemy==2.0.36 alembic==1.14.1 python-dotenv==1.0.1 requests==2.32.3 PySocks==1.7.1 feedparser==6.0.11 dnslib==0.9.25 dnspython==2.6.1
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -m pip install pywebview pyinstaller
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Frontend
        run: |
          npm.cmd --prefix frontend install
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm.cmd --prefix frontend run build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Desktop EXE (AMD64)
        run: |
          $args = @(
            "--noconfirm"
            "--clean"
            "--onefile"
            "--windowed"
            "--name", "kabootar-client"
            "--icon", "build\windows\kabootar.ico"
            "--add-data", "frontend\templates;frontend\templates"
            "--add-data", "frontend\static;frontend\static"
            "--add-data", "alembic;alembic"
            "desktop_client.py"
          )
          python -m PyInstaller @args
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Prepare Release Asset (AMD64)
        if: github.event_name == 'release'
        run: Copy-Item dist\kabootar-client.exe dist\kabootar-client-windows-amd64.exe -Force

      - name: Upload Artifact (AMD64)
        uses: actions/upload-artifact@v4
        with:
          name: kabootar-client-windows-amd64
          path: client/dist/kabootar-client.exe
          if-no-files-found: error

      - name: Publish Release Asset (AMD64)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: client/dist/kabootar-client-windows-amd64.exe

  build-arm64:
    name: Build Windows ARM64
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_arm64 == 'true'
    runs-on: [self-hosted, Windows, ARM64]
    timeout-minutes: 120
    defaults:
      run:
        shell: powershell
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (ARM64)
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: "arm64"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare Kabootar Logo Assets
        run: |
          python -m pip install Pillow cairosvg
          python build\assets\prepare_logo_assets.py

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          if ($LASTEXITCODE -ne 0) {
            Write-Host "requirements.txt install failed, falling back to core dependencies"
            python -m pip install Flask==3.0.3 SQLAlchemy==2.0.36 alembic==1.14.1 python-dotenv==1.0.1 requests==2.32.3 PySocks==1.7.1 feedparser==6.0.11 dnslib==0.9.25 dnspython==2.6.1
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -m pip install pywebview pyinstaller
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Frontend
        run: |
          npm.cmd --prefix frontend install
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm.cmd --prefix frontend run build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Desktop EXE (ARM64)
        run: |
          $args = @(
            "--noconfirm"
            "--clean"
            "--onefile"
            "--windowed"
            "--name", "kabootar-client"
            "--icon", "build\windows\kabootar.ico"
            "--add-data", "frontend\templates;frontend\templates"
            "--add-data", "frontend\static;frontend\static"
            "--add-data", "alembic;alembic"
            "desktop_client.py"
          )
          python -m PyInstaller @args
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Artifact (ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: kabootar-client-windows-arm64
          path: client/dist/kabootar-client.exe
          if-no-files-found: error
