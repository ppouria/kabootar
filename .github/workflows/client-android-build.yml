name: Kabootar Client Android Build

on:
  push:
    paths:
      - "client/android/**"
      - "client/build/android/**"
      - "client/build/assets/**"
      - "version.properties"
      - ".github/workflows/client-android-build.yml"
  pull_request:
    paths:
      - "client/android/**"
      - "client/build/android/**"
      - "client/build/assets/**"
      - "version.properties"
      - ".github/workflows/client-android-build.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      start_url:
        description: "Web URL loaded by Android app WebView"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Prepare Kabootar Logo Assets
        run: |
          python -m pip install Pillow cairosvg
          python client/build/assets/prepare_logo_assets.py

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare Android release keystore
        if: github.event_name == 'release'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret for release signing" >&2
            exit 1
          fi
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > client/android/release.keystore

      - name: Build Debug + Release APK
        env:
          ANDROID_START_URL: ${{ github.event.inputs.start_url || vars.ANDROID_START_URL || 'file:///android_asset/bootstrap.html' }}
          KABOOTAR_KEYSTORE_FILE: ${{ github.event_name == 'release' && format('{0}/client/android/release.keystore', github.workspace) || '' }}
          KABOOTAR_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KABOOTAR_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KABOOTAR_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          gradle -p client/android :app:clean :app:assembleDebug :app:assembleRelease \
            -PstartUrl="${ANDROID_START_URL}"

      - name: Prepare Android APK outputs
        run: |
          RELEASE_DIR="client/android/app/build/outputs/apk/release"
          UNIVERSAL_SOURCE="$(find "${RELEASE_DIR}" -maxdepth 1 -type f \( -name '*universal*release*.apk' -o -name 'app-release.apk' \) | head -n 1)"
          ARM64_SOURCE="$(find "${RELEASE_DIR}" -maxdepth 1 -type f -name '*arm64-v8a*release*.apk' | head -n 1)"
          ARMV7_SOURCE="$(find "${RELEASE_DIR}" -maxdepth 1 -type f -name '*armeabi-v7a*release*.apk' | head -n 1)"

          test -n "${UNIVERSAL_SOURCE}" || { echo 'universal APK not found' >&2; exit 1; }
          test -n "${ARM64_SOURCE}" || { echo 'arm64-v8a APK not found' >&2; exit 1; }
          test -n "${ARMV7_SOURCE}" || { echo 'armeabi-v7a APK not found' >&2; exit 1; }

          cp "${UNIVERSAL_SOURCE}" "${RELEASE_DIR}/kabootar-client-android-universal.apk"
          cp "${ARM64_SOURCE}" "${RELEASE_DIR}/kabootar-client-android-arm64-v8a.apk"
          cp "${ARMV7_SOURCE}" "${RELEASE_DIR}/kabootar-client-android-armeabi-v7a.apk"

      - name: Upload Android APKs
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: kabootar-client-android-apks
          path: |
            client/android/app/build/outputs/apk/release/kabootar-client-android-universal.apk
            client/android/app/build/outputs/apk/release/kabootar-client-android-arm64-v8a.apk
            client/android/app/build/outputs/apk/release/kabootar-client-android-armeabi-v7a.apk
          if-no-files-found: error

      - name: Publish Release Assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          overwrite_files: true
          files: |
            client/android/app/build/outputs/apk/release/kabootar-client-android-universal.apk
            client/android/app/build/outputs/apk/release/kabootar-client-android-arm64-v8a.apk
            client/android/app/build/outputs/apk/release/kabootar-client-android-armeabi-v7a.apk
