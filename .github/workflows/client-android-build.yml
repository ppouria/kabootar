name: Kabootar Android Build

on:
  push:
    paths:
      - "client/android/**"
      - "client/build/android/**"
      - "client/build/assets/**"
      - "client/app/**"
      - "client/frontend/**"
      - "client/vendor/python/**"
      - "version.properties"
      - ".github/workflows/client-android-build.yml"
  pull_request:
    paths:
      - "client/android/**"
      - "client/build/android/**"
      - "client/build/assets/**"
      - "client/app/**"
      - "client/frontend/**"
      - "client/vendor/python/**"
      - "version.properties"
      - ".github/workflows/client-android-build.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs: {}

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Version
        run: |
          VERSION_NAME="$(sed -n 's/^version_name=//p' version.properties | head -n 1 | tr -d '\r\n')"

          VERSION_NAME="${VERSION_NAME:-0.0.0}"
          SAFE_NAME="$(printf '%s' "${VERSION_NAME}" | tr -cs '[:alnum:]._-' '-' | sed 's/^-*//; s/-*$//')"
          SAFE_NAME="${SAFE_NAME:-0.0.0}"
          VERSION_TAG="v${SAFE_NAME}"

          echo "VERSION_TAG=${VERSION_TAG}" >> "${GITHUB_ENV}"
          echo "ANDROID_ARTIFACT_NAME=Kabootar-client-android-apks-${VERSION_TAG}" >> "${GITHUB_ENV}"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Prepare Kabootar Logo Assets
        run: |
          python -m pip install Pillow cairosvg
          python client/build/assets/prepare_logo_assets.py

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare Android release keystore
        if: github.event_name == 'release'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret for release signing" >&2
            exit 1
          fi
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > client/android/release.keystore

      - name: Build Debug + Release APK
        env:
          KABOOTAR_KEYSTORE_FILE: ${{ github.event_name == 'release' && format('{0}/client/android/release.keystore', github.workspace) || '' }}
          KABOOTAR_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KABOOTAR_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KABOOTAR_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          export KABOOTAR_BUILD_PYTHON="${pythonLocation}/bin/python"
          gradle -p client/android :app:clean :app:assembleDebug :app:assembleRelease

      - name: Prepare Android APK outputs
        run: |
          RELEASE_DIR="client/android/app/build/outputs/apk/release"
          UNIVERSAL_SOURCE="$(find "${RELEASE_DIR}" -maxdepth 1 -type f \( -name '*universal*release*.apk' -o -name 'app-release.apk' \) | head -n 1)"
          ARM64_SOURCE="$(find "${RELEASE_DIR}" -maxdepth 1 -type f -name '*arm64-v8a*release*.apk' | head -n 1)"
          X64_SOURCE="$(find "${RELEASE_DIR}" -maxdepth 1 -type f -name '*x86_64*release*.apk' | head -n 1)"

          test -n "${UNIVERSAL_SOURCE}" || { echo 'universal APK not found' >&2; exit 1; }
          test -n "${ARM64_SOURCE}" || { echo 'arm64-v8a APK not found' >&2; exit 1; }
          test -n "${X64_SOURCE}" || { echo 'x86_64 APK not found' >&2; exit 1; }

          UNIVERSAL_TARGET="Kabootar-client-android-universal-${VERSION_TAG}.apk"
          ARM64_TARGET="Kabootar-client-android-arm64-v8a-${VERSION_TAG}.apk"
          X64_TARGET="Kabootar-client-android-x86_64-${VERSION_TAG}.apk"

          cp "${UNIVERSAL_SOURCE}" "${RELEASE_DIR}/${UNIVERSAL_TARGET}"
          cp "${ARM64_SOURCE}" "${RELEASE_DIR}/${ARM64_TARGET}"
          cp "${X64_SOURCE}" "${RELEASE_DIR}/${X64_TARGET}"

          echo "APK_UNIVERSAL=${UNIVERSAL_TARGET}" >> "${GITHUB_ENV}"
          echo "APK_ARM64=${ARM64_TARGET}" >> "${GITHUB_ENV}"
          echo "APK_X64=${X64_TARGET}" >> "${GITHUB_ENV}"

      - name: Upload Android APKs
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ANDROID_ARTIFACT_NAME }}
          path: |
            client/android/app/build/outputs/apk/release/${{ env.APK_UNIVERSAL }}
            client/android/app/build/outputs/apk/release/${{ env.APK_ARM64 }}
            client/android/app/build/outputs/apk/release/${{ env.APK_X64 }}
          if-no-files-found: error

      - name: Publish Release Assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          overwrite_files: true
          files: |
            client/android/app/build/outputs/apk/release/${{ env.APK_UNIVERSAL }}
            client/android/app/build/outputs/apk/release/${{ env.APK_ARM64 }}
            client/android/app/build/outputs/apk/release/${{ env.APK_X64 }}
