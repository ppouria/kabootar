name: Kabootar DNS Bridge Linux Build

on:
  push:
    paths:
      - "server/**"
      - "version.properties"
      - ".github/workflows/dns-bridge-linux-build.yml"
  pull_request:
    paths:
      - "server/**"
      - "version.properties"
      - ".github/workflows/dns-bridge-linux-build.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      build_dns_bridge:
        description: "Build DNS bridge binaries"
        required: true
        default: true
        type: boolean
      build_linux_x64:
        description: "Build Linux x64 binary"
        required: true
        default: true
        type: boolean
      build_linux_arm64:
        description: "Build Linux arm64 binary"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  prepare-version:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.ver.outputs.version_name }}
      version_tag: ${{ steps.ver.outputs.version_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Version
        id: ver
        shell: bash
        run: |
          VERSION_NAME="$(sed -n 's/^version_name=//p' version.properties | head -n 1 | tr -d '\r\n')"

          VERSION_NAME="${VERSION_NAME:-0.0.0}"
          SAFE_NAME="$(printf '%s' "${VERSION_NAME}" | tr -cs '[:alnum:]._-' '-' | sed 's/^-*//; s/-*$//')"
          SAFE_NAME="${SAFE_NAME:-0.0.0}"

          echo "version_name=${SAFE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version_tag=v${SAFE_NAME}" >> "${GITHUB_OUTPUT}"

  build-linux-x64:
    name: Build DNS Bridge Linux x64
    runs-on: ubuntu-latest
    needs: prepare-version
    if: github.event_name != 'workflow_dispatch' || (inputs.build_dns_bridge && inputs.build_linux_x64)
    defaults:
      run:
        shell: bash
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build DNS Bridge Binary (x64)
        env:
          VERSION_TAG: ${{ needs.prepare-version.outputs.version_tag }}
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --onefile \
            --name kabootar-dns-bridge \
            --paths "../client/vendor/python" \
            --hidden-import persian_encoder \
            --hidden-import persian_encoder.seed_words \
            --hidden-import persian_encoder.large_words \
            --add-data "../version.properties:." \
            --add-data "../client/vendor/python/persian_encoder/data:persian_encoder/data" \
            --collect-all persian_encoder \
            manage.py

          python -m PyInstaller.utils.cliutils.archive_viewer -l dist/kabootar-dns-bridge \
            | grep -Eq 'persian_encoder[/\\]data[/\\]hazm_words\.tsv'

          OUT_NAME="Kabootar-dns-bridge-amd64-${VERSION_TAG}"
          cp dist/kabootar-dns-bridge "dist/${OUT_NAME}"
          chmod +x "dist/${OUT_NAME}"
          echo "OUT_NAME=${OUT_NAME}" >> "${GITHUB_ENV}"

      - name: Upload Artifact (x64)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUT_NAME }}
          path: server/dist/${{ env.OUT_NAME }}
          if-no-files-found: error

      - name: Publish Release Asset (x64)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: server/dist/${{ env.OUT_NAME }}

  build-linux-arm64:
    name: Build DNS Bridge Linux arm64
    runs-on: ubuntu-24.04-arm
    needs: prepare-version
    if: github.event_name != 'workflow_dispatch' || (inputs.build_dns_bridge && inputs.build_linux_arm64)
    defaults:
      run:
        shell: bash
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build DNS Bridge Binary (arm64)
        env:
          VERSION_TAG: ${{ needs.prepare-version.outputs.version_tag }}
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --onefile \
            --name kabootar-dns-bridge \
            --paths "../client/vendor/python" \
            --hidden-import persian_encoder \
            --hidden-import persian_encoder.seed_words \
            --hidden-import persian_encoder.large_words \
            --add-data "../version.properties:." \
            --add-data "../client/vendor/python/persian_encoder/data:persian_encoder/data" \
            --collect-all persian_encoder \
            manage.py

          python -m PyInstaller.utils.cliutils.archive_viewer -l dist/kabootar-dns-bridge \
            | grep -Eq 'persian_encoder[/\\]data[/\\]hazm_words\.tsv'

          OUT_NAME="Kabootar-dns-bridge-arm64-${VERSION_TAG}"
          cp dist/kabootar-dns-bridge "dist/${OUT_NAME}"
          chmod +x "dist/${OUT_NAME}"
          echo "OUT_NAME=${OUT_NAME}" >> "${GITHUB_ENV}"

      - name: Upload Artifact (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUT_NAME }}
          path: server/dist/${{ env.OUT_NAME }}
          if-no-files-found: error

      - name: Publish Release Asset (arm64)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: server/dist/${{ env.OUT_NAME }}
