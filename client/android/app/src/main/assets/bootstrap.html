<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kabootar</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07131f;
      --panel: #0d2234;
      --line: #1c4669;
      --text: #eef6ff;
      --muted: #9ab5cc;
      --accent: #7ad0ff;
      --good: #7dffba;
      --bad: #ff9f9f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Segoe UI, Tahoma, sans-serif;
      background:
        radial-gradient(circle at top, rgba(122,208,255,.18), transparent 40%),
        linear-gradient(180deg, #08121c, var(--bg));
      color: var(--text);
    }
    .card {
      width: min(720px, 100%);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(16,34,51,.96), rgba(9,21,33,.96));
      box-shadow: 0 20px 60px rgba(0, 0, 0, .35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }
    p {
      margin: 0 0 14px;
      line-height: 1.7;
      color: var(--muted);
    }
    .stack {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      border: 1px solid var(--line);
      background: rgba(18, 47, 71, .9);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 15px;
      cursor: pointer;
    }
    .btn.primary {
      background: linear-gradient(180deg, #1a5c8a, #0c4264);
      border-color: #2f79ad;
    }
    .status {
      min-height: 42px;
      color: var(--good);
      font-size: 15px;
      line-height: 1.7;
    }
    .status.error {
      color: var(--bad);
    }
    .hint {
      font-size: 14px;
      color: var(--muted);
    }
    .spinner {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 3px solid rgba(122, 208, 255, .18);
      border-top-color: var(--accent);
      animation: spin .85s linear infinite;
      margin-bottom: 4px;
    }
    .state-row {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Kabootar</h1>
    <p>This build starts the Kabootar backend on the device and then opens the local web app.</p>
    <div class="stack">
      <div class="state-row">
        <div class="spinner" id="spinner"></div>
        <div>
          <div id="state" class="status">Starting local backend...</div>
          <p class="hint" id="detail">The first launch may take a bit longer while Python starts.</p>
        </div>
      </div>
      <div class="row">
        <button id="open" class="btn primary" type="button">Open local app</button>
        <button id="retry" class="btn" type="button">Retry backend</button>
      </div>
      <p class="hint">Everything should stay inside the APK now: local backend on <code>127.0.0.1</code>, then the same web UI inside WebView.</p>
    </div>
  </main>
  <script>
    const stateNode = document.getElementById('state');
    const detailNode = document.getElementById('detail');
    const spinner = document.getElementById('spinner');
    const bridge = window.KabootarAndroid || null;
    let redirecting = false;

    const getState = () => {
      try {
        return bridge && typeof bridge.getBackendState === 'function' ? bridge.getBackendState() : 'unknown';
      } catch (_) {
        return 'unknown';
      }
    };

    const getMessage = () => {
      try {
        return bridge && typeof bridge.getBackendMessage === 'function' ? bridge.getBackendMessage() : '';
      } catch (_) {
        return '';
      }
    };

    const getUrl = () => {
      try {
        return bridge && typeof bridge.getBackendUrl === 'function' ? bridge.getBackendUrl() : '';
      } catch (_) {
        return '';
      }
    };

    const applyState = () => {
      const state = getState();
      const message = getMessage() || 'Starting local backend...';
      stateNode.textContent = message;
      stateNode.classList.toggle('error', state === 'error');
      spinner.style.display = state === 'ready' ? 'none' : 'block';
      if (state === 'ready') {
        detailNode.textContent = 'Local backend is ready. Opening the Kabootar UI.';
        if (!redirecting && bridge && typeof bridge.openLocalBackend === 'function') {
          redirecting = true;
          bridge.openLocalBackend();
        }
      } else if (state === 'error') {
        detailNode.textContent = 'The embedded backend did not start cleanly. Retry it from here.';
      } else {
        detailNode.textContent = 'The first launch may take a bit longer while Python starts.';
      }
    };

    document.getElementById('open').addEventListener('click', () => {
      if (bridge && typeof bridge.openLocalBackend === 'function') {
        bridge.openLocalBackend();
      }
    });
    document.getElementById('retry').addEventListener('click', () => {
      redirecting = false;
      if (bridge && typeof bridge.retryBackend === 'function') {
        bridge.retryBackend();
      }
    });

    applyState();
    setInterval(applyState, 900);
  </script>
</body>
</html>
